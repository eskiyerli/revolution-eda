name: Build and package Revolution EDA with Nuitka

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }} (python ${{ matrix.python_version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_short: linux
            python_version: '3.13'
          - os: windows-latest
            os_short: windows
            python_version: '3.13'

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
          allow-prereleases: true

      - name: Install system packages (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgl1-mesa-dev libglu1-mesa-dev \
            libxcb-xinerama0 libxkbcommon-x11-0 libssl-dev

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/AppData/Local/pip/Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/poetry.lock') }}-${{ matrix.python_version }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install poetry
          poetry config virtualenvs.create false --local || true
          poetry install --only main --no-interaction --no-ansi
          python -m pip install "nuitka==4.0.0" wheel setuptools

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build with Nuitka
        run: |
          set -euo pipefail

          FLAGS=(
            --standalone
            --deployment
            --assume-yes-for-downloads
            --enable-plugin=pyside6
            --enable-plugin=data-files
            --noinclude-qt-translations
            --include-module=PySide6.QtWebEngineWidgets
            --include-module=PySide6.QtOpenGL
            --include-package=revedaEditor
            --include-package=defaultPDK
            --include-package=cryptography
            --include-package=markdown
            --include-package=polars
            --include-module=pydoc
            --include-package=xml
            --include-package=cProfile
            --include-package=profile
            --include-package-data=defaultPDK
            --include-data-dir=docs=docs
            --include-package=certifi 
            --nofollow-import-to=unittest
            --nofollow-import-to=pytest
            --nofollow-import-to=revedasim
            --nofollow-import-to=revedaPlot
            --nofollow-import-to=plugins
            --product-name='Revolution EDA'
            --product-version='${{ steps.version.outputs.version }}'
            --company-name='Revolution EDA'
            --file-description='Electronic Design Automation Software for Professional Custom IC Design Engineers'
            --output-dir=build
          )

          if [ "${{ matrix.os_short }}" = "windows" ]; then
            FLAGS+=(--windows-icon-from-ico=revedaCoreLogo.ico)
            FLAGS+=(--include-windows-runtime-dlls=yes)
          fi

          python -m nuitka "${FLAGS[@]}" reveda.py

      - name: Package artifact
        run: |
          set -euo pipefail

          REVEDA_DIST=$(find build -maxdepth 2 -name "reveda.dist" -type d | head -n 1 || true)
          if [ -n "$REVEDA_DIST" ]; then
            # Copy bundled resources into reveda.dist
            mkdir -p "$REVEDA_DIST/defaultPDK"
            cp -a defaultPDK/. "$REVEDA_DIST/defaultPDK/"
            mkdir -p "$REVEDA_DIST/plugins"
            cp -a plugins/. "$REVEDA_DIST/plugins/"
          else
            echo "ERROR: reveda.dist not found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RevolutionEDA-${{ matrix.os_short }}-v${{ steps.version.outputs.version }}
          path: |
            build/reveda.dist/
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip artifacts for release
        run: |
          cd artifacts
          for dir in */; do
            if [ -d "$dir" ]; then
              dirname_clean=$(basename "$dir")
              (cd "$dir" && zip -r "../${dirname_clean}.zip" .)
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Revolution EDA ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/*.zip
