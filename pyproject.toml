[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "revolution-eda"
dynamic = ["version"]
description = "Revolution EDA is a new generation integrated circuit design environment."
readme = "README.md"
requires-python = ">=3.13.0"
license-files = { paths = ["LICENSE.txt"] }
authors = [
    { name = "Revolution EDA", email = "48187772+eskiyerli@users.noreply.github.com" },
]
keywords = ["electronic", "design", "schematic", "layout"]
dependencies = [
    "PySide6~=6.9.0",
    "python-dotenv~=1.1.0",
    "quantiphy~=2.20",
    "setuptools~=80.8.0",
    "gdstk~=0.9.53",
    "numpy~=2.2.6",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Electronic Design Automation (EDA)",
]

[project.urls]
Documentation = "https://github.com/eskiyerli/revolution-eda#readme"
Issues = "https://github.com/eskiyerli/revolution-eda/issues"
Source = "https://github.com/eskiyerli/revolution-eda"
Website = "https://reveda.eu"

[project.scripts]
reveda = "reveda:main"

[tool.hatch.build.targets.wheel]
packages = ["revedaEditor", "pdk"]
modules = ["revinit", "reveda"]
exclude = ["plugins/"]

[tool.hatch.version]
path = "revedaEditor/gui/revinit.py"

[tool.hatch.build.targets.wheel.force-include]
"./exampleLibraries" = "exampleLibraries"
"./reveda.py" = "reveda.py"
"./reveda.conf" = "reveda.conf"
"./library.json" = "library.json"

[tool.pyright]
venvPath = "C:/Users/eskiye50/"
venv = "reveda_3p13"

[tool.poetry]
name = "revolution-eda"
version = "0.8.0"
description = "Custom IC Design Environment for professionals"
authors = ["Revolution Semiconductor <48187772+eskiyerli@users.noreply.github.com>"]
license = "Mozilla Public License v2 modified by Commons Clause"
readme = "README.md"
packages = [{include = "revedaEditor"}]

[tool.poetry.dependencies]
python = ">=3.12,<3.14"
PySide6 = "~6.9.2"
quantiphy = "~2.20"
python-dotenv = "~1.1.0"
numpy = "~2.3.1"
gdstk = "~0.9.60"
pyqtgraph = "~0.14.0.dev0"
polars = "~1.33.0"

[tool.poetry.group.dev.dependencies]
pytest = "~8.4.1"

[tool.poetry.scripts]
reveda = "reveda:main"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
